<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <script>
      // Smoke test #1: prove the head script runs at all.
      try { localStorage.setItem('ironclaw-smoke-1', String(Date.now())); } catch (e) {}
    </script>
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IronClaw</title>
    <script>
      // DEV-ONLY: Tauri IPC shim for browser preview / headless dogfood runs.
      // Activated by sessionStorage key __ICDEV_SHIM__ (set by /__shim.html).
      // No-op in production builds (script body is gated on the key).
      (function () {
        try {
          var raw = sessionStorage.getItem('__ICDEV_SHIM__');
          if (!raw) return;
          var cfg = JSON.parse(raw);
          var settings = cfg.settings;
          var token = cfg.token;
          var shim = {
            invoke: function (cmd, args) {
              try { console.log('[shim]', cmd); } catch (e) {}
              if (cmd === 'get_settings') return Promise.resolve(settings);
              if (cmd === 'save_settings') {
                if (args && args.settings) Object.assign(settings, args.settings);
                try { sessionStorage.setItem('__ICDEV_SHIM__', JSON.stringify({ settings: settings, token: token })); } catch (e) {}
                return Promise.resolve(null);
              }
              if (cmd === 'get_token') return Promise.resolve(token);
              if (cmd === 'set_token' || cmd === 'delete_token') return Promise.resolve(null);
              if (cmd === 'get_openrouter_key' || cmd === 'get_llm_provider_credential') return Promise.resolve(null);
              if (cmd === 'set_openrouter_key' || cmd === 'delete_openrouter_key') return Promise.resolve(null);
              if (cmd === 'set_llm_provider_credential' || cmd === 'delete_llm_provider_credential') return Promise.resolve(null);
              if (cmd === 'get_or_create_local_token') return Promise.resolve('local-fake-token');
              if (cmd === 'local_data_dir') return Promise.resolve('/tmp/ironclaw-fake');
              if (cmd === 'sidecar_status') return Promise.resolve({ running: false, port: null });
              if (cmd === 'start_sidecar') return Promise.resolve(3100);
              if (cmd === 'stop_sidecar') return Promise.resolve(null);
              if (cmd === 'set_tray_visible' || cmd === 'update_tray_status' || cmd === 'update_tray_badge' || cmd === 'update_tray_recent') return Promise.resolve(null);
              if (cmd === 'open_profile_window' || cmd === 'open_text_dialog' || cmd === 'save_text_dialog' || cmd === 'export_settings_dialog' || cmd === 'reveal_in_finder') return Promise.resolve(null);
              try { console.warn('[shim] unknown cmd', cmd); } catch (e) {}
              return Promise.resolve(null);
            }
          };
          window.__TAURI_INTERNALS__ = shim;
          window.__TAURI__ = shim;
          window.__SHIM_INSTALLED__ = true;
          try { console.log('[shim] installed'); } catch (e) {}
        } catch (e) {
          try { console.warn('[shim] install failed', e); } catch (_) {}
        }
      })();
    </script>
    <script>
      // Last-resort error capture for production diagnosis. Webview crashes
      // and unhandled rejections often leave the dev console unavailable
      // (devtools disabled in release). We persist the last ~10 errors to
      // localStorage so the Rust side (or a manual SQLite poke) can read
      // them without a devtools session. Tagged keys so they're trivial to
      // grep.
      (function () {
        try {
          var KEY = 'ironclaw-error-log';
          function push(entry) {
            try {
              var raw = localStorage.getItem(KEY);
              var arr = raw ? JSON.parse(raw) : [];
              if (!Array.isArray(arr)) arr = [];
              arr.unshift(entry);
              if (arr.length > 10) arr.length = 10;
              localStorage.setItem(KEY, JSON.stringify(arr));
            } catch (e) { /* localStorage full / disabled — non-fatal */ }
          }
          window.addEventListener('error', function (ev) {
            push({
              ts: Date.now(),
              kind: 'error',
              msg: String(ev.message || ev.error || 'unknown'),
              src: String(ev.filename || ''),
              line: ev.lineno || 0,
              col: ev.colno || 0,
              stack: ev.error && ev.error.stack ? String(ev.error.stack).slice(0, 2000) : null
            });
          });
          window.addEventListener('unhandledrejection', function (ev) {
            var r = ev.reason;
            push({
              ts: Date.now(),
              kind: 'unhandledrejection',
              msg: r && r.message ? String(r.message) : String(r),
              stack: r && r.stack ? String(r.stack).slice(0, 2000) : null
            });
          });
          // Heartbeat: confirms the script ran. Stamped once per session.
          push({ ts: Date.now(), kind: 'boot', msg: 'app.html error capture installed', ua: String(navigator.userAgent || '').slice(0, 200) });
        } catch (e) { /* swallow — never block boot */ }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg-deep text-text-primary font-sans antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
