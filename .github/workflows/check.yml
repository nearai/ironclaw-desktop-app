name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run verify:static-frontend
      - name: Install Chromium for static smoke
        run: npx playwright install --with-deps chromium
      - run: npm run smoke:webui-static
      - run: npm run test
      # The static product UI (crates/.../static/js) ships ~28 node:test suites
      # that vitest does not pick up; run them so a regression there fails CI.
      - run: npm run test:static
      - run: npm run build
      - name: Check bundle size budget
        run: SKIP_BUILD=1 bash scripts/check-bundle-size.sh
        continue-on-error: false

  rust:
    runs-on: macos-14
    env:
      IRONCLAW_REBORN_REF: reborn-integration
    steps:
      - uses: actions/checkout@v4

      - name: Checkout IronClaw Reborn source
        uses: actions/checkout@v4
        with:
          repository: nearai/ironclaw
          ref: ${{ env.IRONCLAW_REBORN_REF }}
          path: .deps/ironclaw

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            .deps/ironclaw
      - run: npm ci
      # Sidecar binaries are gitignored — fetch before cargo check so tauri-build
      # can resolve the bundle.externalBin paths.
      - name: Download sidecar binaries
        run: bash src-tauri/binaries/download.sh
      - name: Build Reborn sidecar binary
        run: bash scripts/build-reborn-sidecars.sh --repo .deps/ironclaw --targets aarch64-apple-darwin
      - run: cargo check --manifest-path src-tauri/Cargo.toml --locked
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib --release --locked
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked -- -D warnings
        continue-on-error: true  # warn-don't-block until clippy is clean
