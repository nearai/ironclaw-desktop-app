name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar binaries
        run: bash src-tauri/binaries/download.sh

      - run: npm ci

      - name: Resolve package version
        id: package-version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Release readiness preflight
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: bash scripts/check-release-readiness.sh --require-apple-signing

      - name: Prepare Apple notarization API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_dir="${RUNNER_TEMP}/appstoreconnect"
          mkdir -p "${key_dir}"
          key_path="${key_dir}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "APPLE_API_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Build Tauri bundle (aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}

      - name: Build Tauri bundle (x86_64)
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ || true
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ || true

          # Updater artifacts (signed when keys are configured)
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/IronClaw.app.tar.gz \
            "release-artifacts/IronClaw_${{ steps.package-version.outputs.version }}_aarch64.app.tar.gz"
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/IronClaw.app.tar.gz.sig \
            "release-artifacts/IronClaw_${{ steps.package-version.outputs.version }}_aarch64.app.tar.gz.sig"
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/IronClaw.app.tar.gz \
            "release-artifacts/IronClaw_${{ steps.package-version.outputs.version }}_x86_64.app.tar.gz"
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/IronClaw.app.tar.gz.sig \
            "release-artifacts/IronClaw_${{ steps.package-version.outputs.version }}_x86_64.app.tar.gz.sig"

          ls -la release-artifacts/

      - name: Generate updater manifest
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v${{ steps.package-version.outputs.version }}"
          fi
          node scripts/build-updater-manifest.mjs \
            --artifacts release-artifacts \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${release_tag}" \
            --version "${{ steps.package-version.outputs.version }}"
          cat release-artifacts/latest.json

      - name: Verify Developer ID notarization
        run: |
          set -euo pipefail
          for app in src-tauri/target/*/release/bundle/macos/IronClaw.app; do
            codesign --verify --deep --strict --verbose=2 "${app}"
            spctl -a -vvv --type exec "${app}"
            xcrun stapler validate "${app}"
          done
          for dmg in release-artifacts/*.dmg; do
            xcrun stapler validate "${dmg}"
          done

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ironclaw-desktop-${{ github.sha }}
          path: release-artifacts/
          retention-days: 14
