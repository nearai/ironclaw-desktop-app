<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IronClaw — Workbench (v12)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   IRONCLAW — WORKBENCH (v11)
   v10 skeleton kept. v11 makes it honest:
   - One work-item state machine; rail, triage, Library, receipts
     all derive from it. Approving / reconnecting update everything.
   - Approval cannot be bypassed casually (review-gated; explicit
     logged override).
   - Responsive integrity: compact rail, reflow, no overflow.
   - Research source drill-in; Library search; settled transitions.
   ============================================================ */
:root{
  --surface:#f7f8f6; --canvas:#ffffff; --ink:#161a22; --ink-2:#363d4b; --muted:#586173; --faint:#737d8c;
  --line:#e3e6e0; --line-2:#eef0ec; --hair:#ebeee8;
  --accent:#1c63d6; --accent-press:#1654b8; --accent-tint:#eaf1fd; --accent-soft:#f3f7fe;
  --hold:#bd5a2f; --hold-text:#974320; --hold-tint:#fbeae0; --hold-line:#eccab6;
  --good:#2c8c5e; --good-text:#1d6042; --good-tint:#e4f1ea;
  --warn:#a9790a; --warn-tint:#f6efd9; --warn-text:#7d5a06;
  --danger:#c0413c;
  --rail:#13181f; --rail-2:#1c232d; --rail-ink:#e9eef5; --rail-muted:#909cae; --rail-line:#242d39; --rail-active:#212b38; --rail-accent:#6aa6ff;
  --serif:"Newsreader",Georgia,serif; --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --shadow-1:0 1px 2px rgba(20,24,33,.05);
  --shadow-pop:0 24px 60px -20px rgba(20,24,33,.42);
  --r:8px; --r-lg:13px;
}
[data-theme="dark"]{
  --surface:#0f1217; --canvas:#161b22; --ink:#e8edf4; --ink-2:#c8d0db; --muted:#9aa6b6; --faint:#7c8693;
  --line:#262e39; --line-2:#1e252e; --hair:#222932;
  --accent:#5b9bf2; --accent-tint:#172a45; --accent-soft:#131c2a; --accent-press:#4a86db;
  --hold:#e0814f; --hold-text:#f0a079; --hold-tint:#2c1a10; --hold-line:#46291a;
  --good:#46ad79; --good-text:#6cca9e; --good-tint:#13271d;
  --warn:#d6a838; --warn-tint:#2a2412; --warn-text:#e6c46c; --danger:#e8746e;
  --shadow-1:0 1px 2px rgba(0,0,0,.4); --shadow-pop:0 24px 60px -20px rgba(0,0,0,.8);
}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow-x:hidden}
body{font-family:var(--sans);background:var(--surface);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.serif{font-family:var(--serif)}.tnum{font-variant-numeric:tabular-nums}.mono{font-family:var(--mono)}
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
.btn:focus-visible,.send:focus-visible,.tab:focus-visible{outline-offset:2px;box-shadow:0 0 0 3px var(--accent-tint)}
.sqr:focus-visible,.ditem:focus-visible{outline-offset:-2px}
button{font-family:inherit;color:inherit}input,select,textarea{font-family:inherit}
svg{fill:none}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

.app{display:grid;grid-template-columns:54px 252px minmax(0,1fr);grid-template-rows:52px minmax(0,1fr);grid-template-areas:"nav dock top" "nav dock main";height:100vh}

/* nav */
.nav{grid-area:nav;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:11px 0;gap:3px}
.nav .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(150deg,#2bb3a4,#139e90 55%,#0c6f65);margin-bottom:10px}
.nav button{background:none;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;width:100%;color:var(--rail-muted);font-size:10px;font-weight:500;position:relative}
.nav button svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav button:hover{color:var(--rail-ink)}.nav button.active{color:#fff}
.nav button.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--rail-accent);border-radius:0 3px 3px 0}
.nav .sp{flex:1}

/* dock (state-driven) */
.dock{grid-area:dock;background:var(--rail);border-right:1px solid #0b0e12;color:var(--rail-ink);padding:14px 12px;overflow-y:auto}
.dock .ws{display:flex;align-items:center;gap:9px;padding:0 4px 13px;border-bottom:1px solid var(--rail-line);margin-bottom:6px}
.dock .ws .nm{font-size:15px;font-weight:600}.dock .ws .sub{font-size:11px;color:var(--rail-muted)}
.dgrp{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--rail-muted);margin:15px 4px 6px;font-weight:600;display:flex;align-items:center;gap:6px}
.dgrp .gn{margin-left:auto;color:#fff;background:var(--rail-2);border-radius:999px;padding:0 6px;font-size:9.5px;line-height:15px}
.ditem{display:grid;grid-template-columns:8px 1fr;gap:9px;align-items:start;padding:8px;border-radius:var(--r);cursor:pointer;color:var(--rail-ink)}
.ditem:hover{background:var(--rail-2)}.ditem.active{background:var(--rail-active)}
.ditem .dot{width:7px;height:7px;border-radius:50%;margin-top:5px;justify-self:center}
.dot-hold{background:var(--hold)}.dot-block{background:#d9534f}.dot-run{background:#3ab0a2}.dot-ready{background:var(--warn)}.dot-done{background:var(--good)}
.ditem .t{font-size:12.5px;font-weight:500;line-height:1.35;overflow:hidden;text-overflow:ellipsis}
.ditem .w{grid-column:2;font-size:10.5px;color:var(--rail-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* top */
.top{grid-area:top;display:flex;align-items:center;gap:10px;padding:0 18px;background:var(--canvas);border-bottom:1px solid var(--line)}
.top .crumb{font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden}
.top .crumb b{color:var(--ink);font-weight:600;white-space:nowrap}.top .crumb .sep{color:var(--faint)}
.top .back{background:none;border:1px solid var(--line);border-radius:7px;height:28px;padding:0 10px;font-size:12.5px;color:var(--muted);cursor:pointer;display:none;align-items:center;gap:6px;flex:none}
.top .back svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.top.in-packet .back{display:inline-flex}
.sp{flex:1}
.iconbtn{background:none;border:1px solid var(--line);border-radius:7px;width:32px;height:30px;cursor:pointer;color:var(--muted);display:grid;place-items:center;flex:none}
.iconbtn:hover{color:var(--ink);border-color:var(--muted)}
.iconbtn svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.acct{display:flex;align-items:center;gap:8px;padding:3px 11px 3px 3px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--muted);flex:none}
.acct .av{width:23px;height:23px;border-radius:50%;background:#3a7a72;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}

/* main */
.main{grid-area:main;overflow-y:auto;overflow-x:hidden;position:relative}
.page{padding:0 34px 64px}
.wrap{max-width:720px;margin:0 auto}.pwide{max-width:960px;margin:0 auto}

/* command */
.command{padding-top:42px}
.greet{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px}
.greet-sub{color:var(--muted);font-size:14px;margin:0 0 20px}
.well{position:relative;border:1px solid var(--line);background:var(--canvas);border-radius:var(--r-lg);box-shadow:var(--shadow-1);transition:border-color .15s,box-shadow .15s}
.well textarea{width:100%;border:0;background:none;border-radius:var(--r-lg);resize:none;outline:none;font-size:17px;line-height:1.55;color:var(--ink);min-height:92px;padding:16px 18px 4px}
.well textarea::placeholder{color:#9aa3af}
.well:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.wbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 12px 11px}
.scope{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12.5px;color:var(--muted);background:var(--surface);cursor:pointer;min-width:0}
.scope svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.7;flex:none}
.scope select{border:0;background:none;outline:none;font-size:12.5px;color:var(--ink);cursor:pointer;max-width:110px}
.wbtn{background:none;border:1px solid var(--line);border-radius:7px;width:32px;height:32px;display:grid;place-items:center;color:var(--muted);cursor:pointer;flex:none}
.wbtn:hover{color:var(--ink);border-color:var(--muted)}
.wbtn svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.send{margin-left:auto;background:var(--accent);color:#fff;border:0;border-radius:9px;height:38px;padding:0 18px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;flex:none}
.send:hover{background:var(--accent-press)}
.send svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.custody{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin:11px 4px 0}
.custody svg{width:14px;height:14px;stroke:var(--good-text);stroke-width:1.8;flex:none}
.custody .ins{margin-left:auto;color:var(--accent);background:none;border:0;cursor:pointer;font-size:12.5px;font-weight:500;flex:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.chip{font-size:13px;color:var(--ink-2);background:var(--canvas);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.more{color:var(--faint);border-style:dashed}
.exrow{display:none;flex-wrap:wrap;gap:8px;margin-top:9px}.exrow.open{display:flex}

/* triage */
.triage{margin-top:36px}
.tgroup{margin-bottom:22px}
.tgroup .gh{font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:8px;color:var(--faint)}
.tgroup .gh .gc{color:var(--muted)}
.tgroup.decide .gh{color:var(--hold-text)}.tgroup.blocked .gh{color:var(--danger)}
.tcard{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--canvas);cursor:pointer;margin-bottom:8px}
.tcard:hover{border-color:var(--muted)}
.tcard .tic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}
.tcard .tic svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8}
.tic.decide{background:var(--hold-tint);color:var(--hold-text)}.tic.block{background:#fbe7e6;color:var(--danger)}.tic.arrive{background:var(--accent-soft);color:var(--accent)}
[data-theme="dark"] .tic.block{background:#2c1614}
.tcard .tm{flex:1;min-width:0}.tcard .tt{font-size:14.5px;font-weight:600;color:var(--ink)}
.tcard .tw{font-size:13px;color:var(--muted);margin-top:2px}
.tcard .trigger{font-size:12px;color:var(--faint);margin-top:5px;display:flex;align-items:center;gap:6px}
.tcard .trigger svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;flex:none}
.tcard .ta{display:flex;gap:7px;flex:none;align-self:center}
.ignore{font-size:12.5px;color:var(--faint);padding:6px 2px;display:flex;align-items:center;gap:7px}
.ignore svg{width:14px;height:14px;stroke:var(--good-text);stroke-width:1.9;flex:none}
.allclear{border:1px dashed var(--line);border-radius:11px;padding:20px;text-align:center;color:var(--muted);font-size:13.5px}

/* buttons */
.btn{border:1px solid var(--line);background:var(--canvas);color:var(--ink);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:var(--muted)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.btn.primary:hover{background:var(--accent-press)}
.btn.hold{background:var(--hold);border-color:var(--hold);color:#fff;font-weight:600}.btn.hold:hover{filter:brightness(.95)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn.danger{background:none;border-color:transparent;color:var(--danger);text-decoration:underline;text-underline-offset:2px}
.foot{font-size:12.5px;color:var(--muted);margin-top:18px;display:flex;align-items:center;gap:8px}
.foot svg{width:14px;height:14px;stroke:var(--good-text);stroke-width:1.8;flex:none}

/* prose / readout */
.read .lbl{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.read p{margin:0;font-family:var(--serif);font-size:16.5px;line-height:1.5;color:var(--ink)}
.state-head{display:flex;align-items:baseline;gap:12px;margin:38px 0 6px;flex-wrap:wrap}
.state-head h1{font-family:var(--serif);font-size:24px;font-weight:600;margin:0;letter-spacing:-.01em}
.state-head .meta{margin-left:auto;font-size:12.5px;color:var(--faint)}
.lede{font-size:16px;color:var(--ink-2);margin:0 0 14px}
.rlist{list-style:none;margin:0;padding:0}
.rlist li{display:flex;align-items:flex-start;gap:14px;padding:15px 0;border-top:1px solid var(--hair)}
.rlist .who{flex:1;min-width:0}.rlist .who .nm{font-family:var(--serif);font-size:16px;color:var(--ink)}
.rlist .who .sug{font-size:13px;color:var(--muted);margin-top:3px}
.rlist .act{display:flex;gap:8px;flex:none;padding-top:2px}

/* live reads */
.srcread{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 18px}
.srcpill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--muted);background:var(--canvas)}
.srcpill svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.7;flex:none}
.srcpill .s{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.srcpill.reading .s{background:var(--accent);animation:pulse 1.1s infinite}
.srcpill.ok{color:var(--good-text)}.srcpill.ok .s{background:var(--good)}
.srcpill.fail{color:var(--danger);border-color:var(--hold-line)}.srcpill.fail .s{background:#d9534f}
.srcpill .re{margin-left:4px;color:var(--accent);cursor:pointer;font-weight:600}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.skel{height:13px;border-radius:6px;background:linear-gradient(90deg,var(--line-2),var(--hair),var(--line-2));background-size:200% 100%;animation:sh 1.3s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skrow{display:flex;flex-direction:column;gap:8px;padding:15px 0;border-top:1px solid var(--hair)}
.exc{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--hold-line);background:var(--hold-tint);border-radius:11px;padding:13px 15px;margin:0 0 18px}
.exc .ei{width:28px;height:28px;border-radius:7px;background:rgba(0,0,0,.04);display:grid;place-items:center;flex:none;color:var(--hold-text)}
.exc .ei svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.9}
.exc .em{flex:1}.exc .et{font-size:14px;font-weight:600;color:var(--ink)}.exc .ew{font-size:13px;color:var(--ink-2);margin-top:2px}

/* packet */
.pk-head{padding:26px 0 0}
.pk-state{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--hold-text);margin-bottom:8px}
.pk-state .d{width:7px;height:7px;border-radius:50%;background:var(--hold)}
.pk-state.run{color:var(--good-text)}.pk-state.run .d{background:#3ab0a2}
.pk-state.draftc{color:var(--warn-text)}.pk-state.draftc .d{background:var(--warn)}
.pk-head h1{font-family:var(--serif);font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em;line-height:1.2}
.pk-ctx{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.ctx{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:3px 9px}
.ctx svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.7;flex:none}
.tabs{display:flex;gap:2px;margin:20px 0 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{background:none;border:0;padding:10px 13px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink)}.tab.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.tab .badge{font-size:10px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:0 6px;color:var(--muted);font-weight:600}
.tab .chk svg{width:14px;height:14px;stroke:var(--good);stroke-width:2.4}
.tabwrap{padding:24px 0 0}
.sec{margin-bottom:28px}
.sec > .h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;margin:0 0 11px;display:flex;align-items:center;gap:8px}

.dec{display:flex;flex-direction:column}
.decrow{display:grid;grid-template-columns:1fr auto;gap:8px 16px;padding:13px 0;border-top:1px solid var(--hair)}
.decrow:first-child{border-top:0}
.decrow .dl{font-weight:600;font-size:14.5px}
.decrow .dv{font-size:14px;text-align:right}
.decrow .dv .pos{color:var(--hold-text);font-weight:600}.decrow .dv .pos.ok{color:var(--good-text)}
.decrow .src{grid-column:1/-1;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.decrow .src button{background:none;border:0;color:var(--accent);cursor:pointer;font-size:12.5px;display:inline-flex;align-items:center;gap:5px;padding:0}
.decrow .src svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.8;flex:none}

.summary{display:flex;gap:10px;flex-wrap:wrap}
.skey{flex:1;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:13px 14px;background:var(--canvas)}
.skey .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.skey.changed .tag{color:var(--good-text)}.skey.held .tag{color:var(--hold-text)}.skey.kept .tag{color:var(--muted)}
.skey .cl{font-family:var(--serif);font-size:14.5px;margin-top:6px}.skey .ch{font-size:12.5px;color:var(--muted);margin-top:4px}

.review{border:1px solid var(--line);border-radius:11px;overflow:hidden}
.review .rh{padding:11px 14px;background:var(--surface);border-bottom:1px solid var(--line);font-size:12.5px;color:var(--muted);font-weight:600}
.rvi{display:flex;align-items:center;gap:11px;padding:11px 14px;border-top:1px solid var(--hair);font-size:13.5px}
.rvi:first-of-type{border-top:0}
.rvi .rc{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;flex:none}
.rvi.done .rc{background:var(--good);border-color:var(--good)}.rvi .rc svg{width:11px;height:11px;stroke:#fff;stroke-width:3}
.rvi .rt{flex:1}.rvi .rt b{font-weight:600}.rvi.stale .rt{color:var(--hold-text)}
.rvi .rlink{color:var(--accent);font-weight:600;cursor:pointer;font-size:12.5px;flex:none}

/* document */
.doctop{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.baseline{font-size:12.5px;color:var(--muted)}.baseline b{color:var(--ink);font-weight:600}
.docsearch{margin-left:auto;display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;padding:5px 10px;background:var(--canvas);min-width:160px}
.docsearch svg{width:14px;height:14px;stroke:var(--muted);stroke-width:1.8;flex:none}
.docsearch input{border:0;outline:none;background:none;font-size:13px;width:100%;color:var(--ink)}
.verselect{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12.5px;color:var(--ink);background:var(--canvas)}
.verselect select{border:0;background:none;outline:none;font-size:12.5px;cursor:pointer;max-width:160px}
.clausesel{display:none}
.doc{display:grid;grid-template-columns:178px 1fr;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--canvas)}
.doc-nav{border-right:1px solid var(--line);background:var(--surface);padding:13px 6px}
.doc-nav .dn-h{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700;padding:0 8px 8px}
.dn{display:block;width:100%;text-align:left;background:none;border:0;padding:7px 9px;border-radius:6px;font-size:12.5px;color:var(--ink-2);cursor:pointer;line-height:1.3}
.dn:hover{background:var(--canvas)}.dn.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
.dn small{display:block;color:var(--faint);font-size:10.5px}.dn.on small{color:var(--accent)}
.doc-main{min-width:0}
.doc-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--surface);font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.doc-bar .right{margin-left:auto;display:flex;gap:7px;align-items:center}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.seg button{background:var(--canvas);border:0;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
.doc-body{padding:18px 20px;max-height:430px;overflow-y:auto}
.clause{padding:0 0 20px;scroll-margin-top:8px}.clause.hide{display:none}
.clause .cnum{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.ctag{font-size:10px;font-weight:700;text-transform:uppercase;padding:1px 7px;border-radius:5px}
.ctag.changed{color:var(--good-text);background:var(--good-tint)}.ctag.held{color:var(--hold-text);background:var(--hold-tint)}.ctag.kept{color:var(--muted);background:var(--surface);border:1px solid var(--line)}
.clause .ctxt{font-family:var(--serif);font-size:15px;line-height:1.65;color:var(--ink);margin-top:8px}
.clause .ctxt .del{color:var(--hold-text);text-decoration:line-through}.clause .ctxt .ins{color:var(--good-text);font-weight:600;background:var(--good-tint);border-radius:3px;padding:0 2px}
.clause[contenteditable=true]{outline:2px solid var(--accent);outline-offset:6px;border-radius:6px;background:var(--accent-soft)}
.cite{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-tint);border-radius:5px;padding:0 5px;margin-left:6px;cursor:pointer;vertical-align:1px;font-family:var(--sans);font-weight:600}
.cite svg{width:10px;height:10px;stroke:currentColor;stroke-width:2}
.cmp{display:grid;grid-template-columns:1fr 1fr}
.cmp .col{padding:16px}.cmp .col:first-child{border-right:1px solid var(--hair)}
.cmp .col .ch{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;margin:0 0 9px}
.cmp .col p{font-family:var(--serif);font-size:13.5px;line-height:1.55;color:var(--ink-2);margin:0 0 13px}
.cmp .theirs p .h{background:var(--hold-tint)}.cmp .ours p .h{background:var(--good-tint);font-weight:600}

/* email */
.email{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--canvas)}
.email .eh{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);display:grid;grid-template-columns:auto 1fr;gap:5px 12px}
.email .eh b{color:var(--ink);font-weight:600}
.email .eb{padding:17px 18px;font-family:var(--serif);font-size:15.5px;line-height:1.65;color:var(--ink);outline:none}
.email .eb[contenteditable=true]{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent-tint)}
.email .ea{display:flex;align-items:center;gap:9px;padding:12px 16px;border-top:1px solid var(--hair);font-size:13px;flex-wrap:wrap}
.email .ea svg{width:15px;height:15px;stroke:var(--muted);stroke-width:1.7;flex:none}
.email .ea .x{margin-left:auto;font-size:12px;color:var(--muted)}
.staleflag{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--hold-text);background:var(--hold-tint);border:1px solid var(--hold-line);border-radius:6px;padding:3px 9px}
.staleflag svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.9;flex:none}

.ev-list{display:flex;flex-direction:column}
.evrow{display:grid;grid-template-columns:20px 1fr auto;gap:11px;align-items:baseline;padding:12px 0;border-top:1px solid var(--hair);cursor:pointer}
.evrow:first-child{border-top:0}.evrow:hover .en{text-decoration:underline}
.evrow .ei{color:var(--good-text);display:grid;place-items:center}.evrow .ei svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.evrow .en{font-size:14px;color:var(--ink)}.evrow .en b{font-weight:600}
.evrow .ed{font-size:13px;color:var(--muted);margin-top:1px}.evrow .et{font-size:11.5px;color:var(--faint);white-space:nowrap}

.act{list-style:none;margin:0;padding:0;position:relative}
.act::before{content:"";position:absolute;left:6px;top:6px;bottom:18px;width:1.5px;background:var(--hair)}
.act li{position:relative;padding:0 0 16px 26px;font-size:13.5px;color:var(--ink-2)}
.act li .ad{position:absolute;left:1.5px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--canvas);border:2px solid var(--good)}
.act li.now .ad{border-color:var(--accent);background:var(--accent)}
.act li .at{color:var(--ink);font-weight:500}.act li .atime{color:var(--faint);font-size:11.5px;margin-left:8px}

.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:460px}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;padding:0 12px 9px 0;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px 11px 0;border-bottom:1px solid var(--hair);vertical-align:top}.tbl tr:last-child td{border-bottom:0}.tbl .nm{font-weight:600}
.tbl tr.clk{cursor:pointer}.tbl tr.clk:hover td{background:var(--accent-soft)}
.pillv{font-size:11px;padding:1px 7px;border-radius:5px;font-weight:600}.pillv.good{color:var(--good-text);background:var(--good-tint)}.pillv.warn{color:var(--hold-text);background:var(--hold-tint)}

.srcq{display:flex;flex-direction:column}
.sqr{display:grid;grid-template-columns:18px 1fr auto auto;gap:11px;align-items:center;padding:11px 0;border-top:1px solid var(--hair);font-size:13.5px;cursor:pointer}
.sqr:first-child{border-top:0}.sqr:hover{background:var(--accent-soft);border-radius:8px}
.sqr .si{color:var(--muted);display:grid;place-items:center}.sqr .si svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.7}
.sqr .sn b{font-weight:600}.sqr .smeta{color:var(--faint);font-size:11.5px}
.sqr .sstate{font-size:12px;color:var(--good-text)}.sqr .sstate.q{color:var(--muted)}
.dotq{display:inline-flex;gap:3px;align-items:center}.dotq i{width:6px;height:6px;border-radius:50%;background:var(--line);display:inline-block}.dotq i.f{background:var(--good)}

.callout{border-left:3px solid var(--warn);background:var(--warn-tint);border-radius:0 9px 9px 0;padding:12px 14px;font-size:13.5px;color:var(--ink-2)}.callout b{color:var(--ink)}
.recips{display:flex;flex-wrap:wrap;gap:7px}
.recip{font-size:12.5px;border:1px solid var(--line);border-radius:999px;padding:4px 11px;background:var(--canvas);display:inline-flex;align-items:center;gap:7px}
.recip .rx{color:var(--faint);cursor:pointer}.recip.add{border-style:dashed;color:var(--accent);cursor:pointer}

/* appbar */
.appbar{position:sticky;bottom:0;margin:8px -34px 0;padding:13px 34px;background:var(--canvas);border-top:1px solid var(--hold-line);display:flex;align-items:center;gap:14px;box-shadow:0 -8px 24px -16px rgba(20,24,33,.25);flex-wrap:wrap}
.appbar.draftc{border-top-color:var(--warn)}
.appbar .ai{width:30px;height:30px;border-radius:8px;background:var(--hold-tint);display:grid;place-items:center;flex:none}
.appbar .ai svg{width:16px;height:16px;stroke:var(--hold-text);stroke-width:1.8}
.appbar .am{flex:1;min-width:180px}.appbar .am .at{font-size:13.5px;font-weight:600;color:var(--ink)}.appbar .am .aw{font-size:12.5px;color:var(--muted)}
.appbar .rev{font-size:12px;color:var(--muted);display:flex;gap:10px;margin-top:3px;flex-wrap:wrap}
.appbar .rev span{display:inline-flex;align-items:center;gap:5px}
.appbar .rev .d{display:inline-grid;place-items:center;width:13px;height:13px}.appbar .rev .d svg{width:13px;height:13px;stroke:var(--good);stroke-width:2.6}
.appbar .rev .o{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--faint);display:inline-block}

/* approval */
.scrim{position:fixed;inset:0;background:rgba(16,19,26,.55);backdrop-filter:blur(2px);z-index:80;display:none;align-items:center;justify-content:center;padding:24px}
.scrim.on{display:flex}
.approve{width:560px;max-width:100%;background:var(--canvas);border-radius:16px;box-shadow:var(--shadow-pop);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.approve .ah{padding:20px 22px 14px;border-bottom:1px solid var(--line)}
.approve .ah .k{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--hold-text)}
.approve .ah .k svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.9}
.approve .ah h2{font-family:var(--serif);font-size:21px;font-weight:600;margin:9px 0 0}
.approve .ab{padding:18px 22px;overflow-y:auto}
.approve .froze{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700;margin:0 0 10px;display:flex;align-items:center;gap:7px}
.approve .froze .lock{width:13px;height:13px;stroke:currentColor;stroke-width:1.8}
.pkg{display:grid;grid-template-columns:auto 1fr;gap:9px 16px;font-size:13.5px}
.pkg dt{color:var(--muted)}.pkg dd{margin:0;color:var(--ink)}.pkg dd b{font-weight:600}.pkg .mono{font-size:12.5px}
.bodyprev{margin-top:14px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.bodyprev .bh{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--line)}
.bodyprev .bb{padding:12px 13px;font-family:var(--serif);font-size:13.5px;line-height:1.55;max-height:110px;overflow-y:auto}
.bodyprev .att{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--hair);font-size:12.5px}
.bodyprev .att svg{width:14px;height:14px;stroke:var(--muted);stroke-width:1.7;flex:none}
.rearm{margin-top:13px;font-size:12.5px;color:var(--hold-text);background:var(--hold-tint);border:1px solid var(--hold-line);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.rearm svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.9;flex:none}
.checklist{margin-top:13px;background:var(--surface);border-radius:8px;padding:11px 12px;display:flex;flex-direction:column;gap:7px}
.checklist .ci{display:flex;align-items:center;gap:9px;font-size:13px}
.checklist .ci .b{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--faint);display:inline-grid;place-items:center;flex:none}
.checklist .ci.done .b{background:var(--good);border-color:var(--good)}.checklist .ci .b svg{width:10px;height:10px;stroke:#fff;stroke-width:3}
.checklist .ci.todo{color:var(--hold-text)}
.gatewarn{margin-top:12px;font-size:12.5px;color:var(--muted);background:var(--hold-tint);border:1px solid var(--hold-line);border-radius:8px;padding:10px 12px}
.approve .af{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.approve .af .x{margin-left:auto;font-size:12px;color:var(--faint)}

/* inspector / source drill-in */
.inspector{position:fixed;top:52px;right:0;bottom:0;width:340px;max-width:92vw;background:var(--canvas);border-left:1px solid var(--line);box-shadow:var(--shadow-pop);transform:translateX(104%);transition:transform .18s;z-index:60;overflow-y:auto;padding:18px}
.inspector.on{transform:translateX(0)}
.inspector .ih{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin:0 0 4px}
.inspector .ih svg{width:15px;height:15px;stroke:var(--good-text);stroke-width:1.8}
.inspector .ihx{margin-left:auto;background:none;border:0;color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
.inspector .isub{font-size:12px;color:var(--muted);margin:0 0 16px}
.iblock{margin-bottom:16px}.iblock h5{font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:700;margin:0 0 7px}
.irow{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;color:var(--ink)}.irow .ic{width:13px;text-align:center;font-weight:700;flex:none}.irow.ok .ic{color:var(--good-text)}.irow.ask .ic{color:var(--hold-text)}
.inote{font-size:12px;color:var(--muted);line-height:1.5}
.snippet{font-family:var(--serif);font-size:13.5px;line-height:1.55;color:var(--ink);background:var(--surface);border-radius:8px;padding:11px 12px;margin-bottom:9px}
.snippet .q{color:var(--faint);font-size:11px;display:block;margin-top:6px;font-family:var(--sans)}

/* library */
.libtop{display:flex;align-items:center;gap:10px;margin:8px 0 14px;flex-wrap:wrap}
.libsearch{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;padding:6px 11px;background:var(--canvas);min-width:200px;flex:1}
.libsearch svg{width:15px;height:15px;stroke:var(--muted);stroke-width:1.8;flex:none}
.libsearch input{border:0;outline:none;background:none;font-size:13.5px;width:100%;color:var(--ink)}
.libfilter{display:inline-flex;gap:4px;border:1px solid var(--line);border-radius:8px;padding:3px;background:var(--canvas)}
.libfilter button{background:none;border:0;padding:5px 10px;font-size:12.5px;color:var(--muted);border-radius:6px;cursor:pointer}
.libfilter button.on{background:var(--accent);color:#fff;font-weight:600}
.librow{display:grid;grid-template-columns:34px 1fr auto;gap:13px;align-items:center;padding:13px 2px;border-top:1px solid var(--hair);cursor:pointer}
.librow:hover .lt{color:var(--accent)}
.librow .lic{width:34px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted)}
.librow .lic svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.7}
.librow .lt{font-size:14.5px;font-weight:500}.librow .lw{font-size:12.5px;color:var(--muted);margin-top:1px}
.librow .lk{font-size:12px;color:var(--faint);white-space:nowrap;text-align:right}
.librow .lk .tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--good-text);background:var(--good-tint);border-radius:5px;padding:1px 7px}
.libempty{color:var(--faint);font-size:13px;padding:24px 2px}

/* dev */
.dev{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:90;background:var(--rail);border-radius:999px;padding:5px;display:none;gap:3px;box-shadow:var(--shadow-pop);flex-wrap:wrap;max-width:94vw;justify-content:center}
.dev.on{display:flex}
.dev button{background:none;border:0;color:var(--rail-muted);font-size:11.5px;padding:6px 11px;border-radius:999px;cursor:pointer}
.dev button:hover{color:#fff}.dev button.on{background:var(--rail-accent);color:#08111f;font-weight:600}
.dev .sl{font-size:9.5px;color:var(--rail-muted);align-self:center;padding:0 6px 0 9px;text-transform:uppercase;letter-spacing:.5px}
.backdrop{position:fixed;inset:52px 0 0 0;background:rgba(16,19,26,.28);z-index:55;display:none}.backdrop.on{display:block}
.menu{display:none}

/* responsive */
@media (max-width:1120px){
  .app{grid-template-columns:54px minmax(0,1fr)}
  .dock{position:fixed;top:52px;left:54px;bottom:0;width:252px;z-index:50;transform:translateX(calc(-100% - 60px));transition:transform .18s}
  .dock.open{transform:translateX(0)}.menu{display:inline-grid}
}
@media (max-width:820px){
  .page{padding:0 18px 60px}
  .doc{grid-template-columns:1fr}.doc-nav{display:none}.clausesel{display:block}
  .cmp{grid-template-columns:1fr}.cmp .col:first-child{border-right:0;border-bottom:1px solid var(--hair)}
  .decrow{grid-template-columns:1fr}.decrow .dv{text-align:left}
  .appbar{margin-left:-18px;margin-right:-18px;padding-left:18px;padding-right:18px}
  .pk-head h1{font-size:21px;line-height:1.25}.greet{font-size:22px}
  /* packet header is redundant with the Back button on narrow panes */
  .top.in-packet .crumb{display:none}
  /* tabs stay one usable row with horizontal scroll instead of clipping */
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .tab{white-space:nowrap;flex:none}
  .pk-ctx .ctx{max-width:100%}
}
@media (max-width:560px){
  .pk-head h1{font-size:19px}
  .pk-head{padding-top:18px}
}
@media (max-width:560px){
  .wbar{flex-wrap:wrap}.send{margin-left:0;width:100%;order:5;margin-top:8px;justify-content:center}
  .well textarea{padding-bottom:92px}
  .scope select{max-width:90px}.docsearch{min-width:120px}
  .tcard{flex-wrap:wrap}.tcard .ta{align-self:flex-start;margin-top:6px}
  .state-head .meta{margin-left:0}
}
</style>
</head>

    <button data-go="library"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2zM4 19a2 2 0 0 1 2-2h12"/></svg>Library</button>
    <button data-go="memory:redlines"><svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>Memory</button>

    <div class="sp"></div>
    <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
  </nav>

    <button class="iconbtn menu" id="menuBtn" aria-label="Show active work"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <button class="back" id="backBtn"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>Work</button>
    <div class="crumb" id="crumb"><b>Work</b></div>
    <span class="sp"></span>
    <button class="iconbtn" id="themeBtn" aria-label="Toggle dark mode" aria-pressed="false"><svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    <div class="acct"><span class="av">A</span> Abhi</div>
  </header>
  <main class="main" id="main"></main>
</div>
<aside class="inspector" id="inspector" aria-label="Inspector"></aside>
<div class="backdrop" id="backdrop"></div>
<div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-label="Approve external action"></div>
<div class="dev" id="dev"><span class="sl">Dev</span>
  <button data-go="home">Home</button><button data-go="readout:needs">Readout</button><button data-go="blocked:slack">Blocked</button>
  <button data-go="packet:northwind">Packet</button><button data-go="research:tee">Research</button><button data-go="investor">Investor</button>
  <button data-go="receipt:northwind">Receipt</button><button data-go="library">Library</button><button data-go="memory:redlines">Memory</button>
  <button onclick="resetState()">Reset</button>
</div>

<script>
const main=document.getElementById('main'),inspector=document.getElementById('inspector'),backdrop=document.getElementById('backdrop'),scrim=document.getElementById('scrim'),topBar=document.getElementById('top'),crumb=document.getElementById('crumb'),dock=document.getElementById('dock');
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const timers=[];function later(fn,ms){const id=setTimeout(fn,reduce?0:ms);timers.push(id);return id;}
function clearLater(){while(timers.length)clearTimeout(timers.pop());}

const I={
  mail:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
  doc:'<svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>',
  slack:'<svg viewBox="0 0 24 24"><path d="M10 3v9M14 3v9M4 9h16M5 15h14"/></svg>',
  book:'<svg viewBox="0 0 24 24"><path d="M5 4a2 2 0 0 1 2-2h11a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H7a2 2 0 0 0-2 2z"/><path d="M5 18a2 2 0 0 0 2 2h11"/></svg>',
  link:'<svg viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M8 12h8"/></svg>',
  shield:'<svg viewBox="0 0 24 24"><path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6z"/></svg>',
  web:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18z"/></svg>',
  alert:'<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 4 3 17a2 2 0 0 0 1.7 3h14.6a2 2 0 0 0 1.7-3L13.7 4a2 2 0 0 0-3.4 0z"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"/></svg>',
  search:'<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>'
};
const chk=`<span class="d">${I.check}</span>`,nochk='<span class="o"></span>';

/* ============ STATE MACHINE ============ */
const SEED={
  items:{
    northwind:{id:'northwind',title:'Counter to Northwind',sub:'Redline + email, held to send',status:'needs_approval',go:'packet:northwind'},
    slack:{id:'slack',title:'Slack blockers',sub:'Slack sign-in expired',status:'blocked',go:'blocked:slack'},
    tee:{id:'tee',title:'TEE vendor research',sub:'Comparing the top 3',status:'working',go:'research:tee'},
    investor:{id:'investor',title:'Investor update, June',sub:'Draft ready · 14 recipients',status:'needs_review',go:'investor'}
  },
  receipts:[{id:'acme',title:'Filed Acme NDA',sub:'Saved to Drive · no external send',when:'Yesterday',tag:'Filed',kind:'doc',go:'library'}],
  packet:{viewed:{document:false,email:false},emailEdited:false,version:6,bypass:false},
  invStale:true
};
/* ============ PERSPECTIVE ============
   What IronClaw has learned about how YOU work — not generic importance.
   This is the layer Superhuman has and a generic triage doesn't: who you
   actually reply to, how fast, what you act on vs ignore, what you're focused
   on. Everything here is observed, shown with its evidence, and correctable. */
const PERSPECTIVE={
  focus:{label:'Northwind MSA renewal',why:'You touched it 5× this week — Gmail, Drive, #deals.',go:'packet:northwind'},
  people:[
    {who:'Dana Reyes',org:'Northwind',tier:'vip',reply:'~38 min',why:'You reply within ~40 min, 11 of 11 times. Tied to your active deal.'},
    {who:'Priya',org:'Acme',tier:'respond',reply:'same day',why:'You answer scheduling same-day, usually one line.'},
    {who:'Sarah',org:'#deals',tier:'respond',reply:'~2 h',why:'You engage deal threads; this one is about your active matter.'},
    {who:'Finance',org:'internal',tier:'fyi',reply:'rarely',why:'You read but reply to only 2 of 14 — usually no action.'},
    {who:'Industry Brief',org:'newsletter',tier:'ignore',reply:'never',why:'Archived the last 9 unread. Auto-deprioritized.'}
  ],
  patterns:[
    {p:'You redline before any client-facing summary leaves.',seen:'4 of 4 legal packets'},
    {p:'Counterparty deadlines get your same-day attention.',seen:'observed across deals'},
    {p:'You triage in the morning; sends cluster 9–11 AM.',seen:'your last 3 weeks'}
  ]
};
const TIER={vip:3,respond:2,fyi:1,ignore:0};
function personFor(name){return PERSPECTIVE.people.find(p=>name&&name.toLowerCase().includes(p.who.toLowerCase().split(' ')[0].toLowerCase()))||null;}
let S=JSON.parse(JSON.stringify(SEED));
const ORDER=[['needs_approval','Needs approval','dot-hold'],['blocked','Blocked','dot-block'],['working','Working','dot-run'],['needs_review','Ready to review','dot-ready']];
function activeItems(status){return Object.values(S.items).filter(i=>i.status===status);}
function dispatch(ev){
  if(ev.type==='approval_granted'){const it=S.items[ev.id];if(it){it.status='receipt';S.receipts.unshift({id:'r-'+ev.id,title:'Counter sent to Northwind',sub:`Email + MSA-redline.docx v${S.packet.version} · approved by you${S.packet.bypass?' · sent without full review':''}`,when:'9:58 AM',tag:'Sent',kind:'mail',go:'receipt:northwind'});}}
  if(ev.type==='source_reconnected'){const it=S.items.slack;if(it){it.status='needs_review';it.title='Slack replies to review';it.sub='#deals, #support · 2 need a reply';}}
  renderDock();
}
function resetState(){S=JSON.parse(JSON.stringify(SEED));renderDock();go('home');}

function renderDock(){
  let html=`<div class="ws"><div><div class="nm">Workbench</div><div class="sub">Abhi · NEAR AI Cloud</div></div></div>`;
  for(const [st,label,dot] of ORDER){
    const list=activeItems(st);if(!list.length)continue;
    html+=`<div class="dgrp">${label} <span class="gn">${list.length}</span></div>`;
    html+=list.map(i=>`<div class="ditem" data-go="${i.go}"><span class="dot ${dot}"></span><div><div class="t">${i.title}</div><div class="w">${i.sub}</div></div></div>`).join('');
  }
  const rec=S.receipts.slice(0,3);
  if(rec.length){html+=`<div class="dgrp">Recent receipts</div>`+rec.map(r=>`<div class="ditem" data-go="${r.go}"><span class="dot dot-done"></span><div><div class="t">${r.title}</div><div class="w">${r.when} · ${r.tag}</div></div></div>`).join('');}
  dock.innerHTML=html;
  dock.querySelectorAll('.ditem[data-go]').forEach(el=>{el.setAttribute('role','button');el.tabIndex=0;el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go(el.getAttribute('data-go'));}});});
  markActive(currentKey);
}
function markActive(key){dock.querySelectorAll('.ditem[data-go]').forEach(d=>d.classList.toggle('active',d.getAttribute('data-go')===key));}

/* ============ routing ============ */
let currentKey='home';
function setCrumb(html,inPacket){crumb.innerHTML=html;topBar.classList.toggle('in-packet',!!inPacket);}
function setNav(go){document.querySelectorAll('.nav [data-go]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-go')===go));}
function closeInspector(){inspector.classList.remove('on');backdrop.classList.remove('on');}
function openInspector(html){inspector.innerHTML=html;inspector.classList.add('on');if(window.matchMedia('(max-width:1120px)').matches)backdrop.classList.add('on');}
backdrop.addEventListener('click',()=>{closeInspector();dock.classList.remove('open');backdrop.classList.remove('on');});

function scene(key){
  clearLater();currentKey=key;
  closeInspector(); /* side panels are packet-scoped: navigation closes any open drawer */
  if(key.startsWith('packet:')){S.packet={viewed:{document:false,email:false},emailEdited:false,version:S.packet.version<6?6:S.packet.version,bypass:false};S.packet.version=6;renderPacket('overview');}
  else if(key==='research:tee') renderResearch('findings');
  else if(key==='investor') renderInvestor();
  else if(key==='readout:needs') renderReadout();
  else if(key==='blocked:slack') renderBlocked();
  else if(key.startsWith('receipt:')) renderReceipt();
  else if(key.startsWith('memory:')) renderMemory();
  else if(key==='perspective') renderPerspective();
  else if(key==='library') renderLibrary();
  else renderHome();
  markActive(key);
  document.querySelectorAll('.dev button[data-go]').forEach(d=>d.classList.toggle('on',d.getAttribute('data-go')===key));
  setNav(key==='library'?'library':(key.startsWith('memory')?'memory:redlines':(key==='perspective'?'perspective':'home')));
  main.scrollTop=0;
}
function go(key){scene(key);} /* settled, no full-page fade */

/* ============ HOME ============ */
/* Behaviour ranking: order what needs you by how YOU actually work, not generic
   importance. Score = sender tier + connected-to-focus + overdue-vs-your-pattern. */
function buildPriorities(){
  const p=[];
  if(S.items.northwind&&S.items.northwind.status==='needs_approval'){
    const dana=personFor('Dana');
    p.push({score:100,go:'packet:northwind',tic:'decide',icon:I.shield,primary:true,
      title:'Approve the counter to Northwind',
      what:'Redline + email are drafted and held. Sending is the only step left.',
      why:`Dana is a VIP — you reply in ${dana?dana.reply:'~40 min'}; she's waited 2h. This is your focus this week.`,
      action:'Open packet'});
  }
  if(S.items.slack&&S.items.slack.status==='blocked'){
    p.push({score:80,go:'blocked:slack',tic:'block',icon:I.alert,
      title:'Reconnect Slack to unblock the Northwind check',
      what:'Inbox read fine; Slack sign-in expired, so the Slack part is stuck.',
      why:'Blocks #deals — where the 8% cap for your active deal was confirmed.',
      action:'Reconnect'});
  }
  if(S.items.slack&&S.items.slack.status==='needs_review'){
    p.push({score:70,go:'blocked:slack',tic:'arrive',icon:I.slack,
      title:'2 Slack replies to review',title2:S.items.slack.title,
      what:'#deals + #support — one ties to the Northwind deal.',
      why:'You engage deal threads same-day; this one is on your active matter.',action:'Review'});
  }
  p.push({score:50,go:'readout:needs',tic:'arrive',icon:I.mail,
    title:'Reply to Priya — move the call to 3 PM',
    what:'One line will do; she needs it before noon.',
    why:'You answer Priya same-day on scheduling — usually one line.',action:'Draft reply'});
  return {list:p.sort((a,b)=>b.score-a.score),
    skipped:'6 newsletters + 1 Finance FYI auto-filed'};
}
function renderHome(){
  setCrumb('<b>Work</b>',false);
  const pr=buildPriorities();
  let triage=`<div class="tgroup"><div class="gh">What needs you <span class="gc">· ranked by how you work</span></div>`
    + pr.list.map(r=>`<div class="tcard" data-go="${r.go}"><div class="tic ${r.tic}">${r.icon}</div>
        <div class="tm"><div class="tt">${r.title}</div><div class="tw">${r.what}</div>
          <div class="trigger" style="color:var(--accent)">${I.web} ${r.why}</div></div>
        <div class="ta"><button class="btn ${r.primary?'primary ':''}sm" data-go="${r.go}">${r.action}</button></div></div>`).join('')
    + `<div class="ignore">${I.check} ${pr.skipped} — you archive these, so they're handled, not surfaced. <button class="btn danger sm" style="margin-left:6px;padding:2px 4px" data-go="perspective">Why?</button></div></div>`;
  main.innerHTML=`<div class="page"><div class="wrap">
    <div class="command">
      <h1 class="greet">Here's what needs you, Abhi.</h1>
      <p class="greet-sub">Ranked by how you actually work — who you reply to, what you act on, what's safe to skip. <a href="#" id="whyRank" style="color:var(--accent);text-decoration:none">How I ranked this</a></p>
      <div class="well"><textarea id="cmd" rows="3" aria-label="Describe the work" placeholder="Describe the work in plain language. Paste a thread, drop a file, or give a multi-step instruction…"></textarea>
        <div class="wbar"><span class="scope">${I.link}<select aria-label="Source scope"><option>Auto sources</option><option>Email</option><option>Slack</option><option>Docs</option><option>Web</option><option>Northwind</option></select></span>
          <span class="scope" title="Model & effort"><svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg><select id="wmModel" aria-label="Model"><option>GLM-5.1-FP8</option><option>Claude Opus 4.7</option><option>Claude Sonnet 4.6</option><option>gpt-oss-120b</option><option>DeepSeek V4 Pro</option></select></span>
          <span class="scope" title="Effort"><select id="wmEffort" aria-label="Effort"><option>Standard</option><option>Careful</option><option>Background</option></select></span>
          <button class="wbtn" aria-label="Attach a file" title="Attach"><svg viewBox="0 0 24 24"><path d="M21 11.5 12.5 20a5 5 0 0 1-7-7l8.5-8.5a3.5 3.5 0 0 1 5 5L10.5 17a1.5 1.5 0 0 1-2-2L16 7.5"/></svg></button>
          <button class="send" id="send"><span id="sendlbl">Ask</span><svg viewBox="0 0 24 24"><path d="M7 17 17 7M9 7h8v8"/></svg></button></div></div>
      <div class="custody">${I.shield}<span>Reads and drafts stay private. External actions need your approval.</span><button class="ins" id="custodyBtn">What's allowed</button></div>
      <div class="chips" id="chips">
        <button class="chip" data-fill="What needs me today?">What needs me today?</button>
        <button class="chip" data-fill="Draft the Northwind counter and show me the key terms before I approve.">Draft the Northwind counter</button>
        <button class="chip" data-fill="Check Slack for anything blocked.">Check Slack blockers</button>
        <button class="chip" data-fill="Research privacy-preserving TEE vendors for fintech and give me a shortlist by tomorrow.">Research TEE vendors</button>
        <button class="chip more" id="moreEx" aria-expanded="false">More</button></div>
      <div class="exrow" id="exrow"><button class="chip" data-fill="Prepare the June investor update from our metrics and Slack wins.">Prepare investor update</button><button class="chip" data-fill="Watch competitor launches and brief me every Friday.">Watch competitor launches</button></div>
    </div>
    <div class="triage">${triage}</div>
  </div></div>`;
  wireCommand();
  document.getElementById('custodyBtn').addEventListener('click',()=>openInspector(taskCustody()));
  const wr=document.getElementById('whyRank');if(wr)wr.addEventListener('click',e=>{e.preventDefault();go('perspective');});
}
function taskCustody(){
  const slackBlocked=S.items.slack&&S.items.slack.status==='blocked';
  return `<div class="ih">${I.shield}Allowed for this task<button class="ihx" aria-label="Close" onclick="closeInspector()">×</button></div><p class="isub">For work in this workspace right now.</p>
    <div class="iblock"><h5>Can read</h5><div class="irow ok"><span class="ic">✓</span>Gmail, Drive</div><div class="irow ${slackBlocked?'ask':'ok'}"><span class="ic">${slackBlocked?'⏸':'✓'}</span>Slack ${slackBlocked?'— sign-in expired':''}</div><div class="irow ok"><span class="ic">✓</span>Public web</div></div>
    <div class="iblock"><h5>Can do privately</h5><div class="irow ok"><span class="ic">✓</span>Summarize, compare, draft</div><div class="irow ok"><span class="ic">✓</span>Prepare documents and emails</div></div>
    <div class="iblock"><h5>Needs your approval</h5><div class="irow ask"><span class="ic">⏸</span>Send email or post to Slack</div><div class="irow ask"><span class="ic">⏸</span>Share externally</div><div class="irow ask"><span class="ic">⏸</span>Save a durable preference</div></div>
    <div class="iblock"><h5>Receipts</h5><div class="inote">Every approved external action is recorded in Library.</div></div>`;
}

/* ============ READOUT (streaming) ============ */
function renderReadout(){
  setCrumb('<b>Work</b>',false);
  main.innerHTML=`<div class="page"><div class="wrap">
    <div class="state-head"><h1 id="roTitle">Reading your inbox…</h1><span class="meta" id="roMeta">live</span></div>
    <div class="srcread" id="roSrc"><span class="srcpill reading">${I.mail}<span class="s"></span>Gmail · reading</span><span class="srcpill">${I.doc}<span class="s"></span>Drive · queued</span></div>
    <div id="roBody"><div class="skrow"><div class="skel" style="width:60%"></div><div class="skel" style="width:85%"></div></div><div class="skrow"><div class="skel" style="width:52%"></div><div class="skel" style="width:78%"></div></div></div>
  </div></div>`;
  later(()=>{
    const s=document.getElementById('roSrc');if(s)s.innerHTML=`<span class="srcpill ok">${I.mail}<span class="s"></span>Gmail · read 8 emails</span>`;
    const t=document.getElementById('roTitle');if(t)t.textContent='3 emails came in. 2 still need you.';
    const m=document.getElementById('roMeta');if(m)m.textContent='Read-only · inbox only · nothing sent';
    const b=document.getElementById('roBody');if(b)b.innerHTML=`<p class="lede">Read your inbox to answer. Nothing was sent or filed.</p>
      <ul class="rlist"><li><div class="who"><div class="nm">Dana, Northwind — requests revised MSA terms</div><div class="sug">Wants a lower liability cap and net 60. Ready as a drafted counter.</div></div><div class="act"><button class="btn primary" data-go="packet:northwind">Open counter</button></div></li>
      <li><div class="who"><div class="nm">Priya, Acme — move tomorrow's call to 3 PM</div><div class="sug">A one-line reply will do.</div></div><div class="act"><button class="btn">Draft reply</button></div></li>
      <li><div class="who"><div class="nm">Finance — updated billing contact</div><div class="sug">No reply needed.</div></div><div class="act"><button class="btn">File</button></div></li></ul>
      <div class="foot">${I.shield}<span>Read inbox only. Nothing was sent or filed.</span></div>`;
  },950);
}

/* ============ BLOCKED (source exception, state-bound) ============ */
function renderBlocked(){
  setCrumb('<b>Work</b>',false);
  const resolved=S.items.slack&&S.items.slack.status!=='blocked';
  if(resolved){renderSlackResolved();return;}
  main.innerHTML=`<div class="page"><div class="wrap">
    <div class="state-head"><h1 id="blTitle">Checking Slack for blockers…</h1><span class="meta">live</span></div>
    <div class="srcread" id="blSrc"><span class="srcpill ok">${I.mail}<span class="s"></span>Gmail · read</span><span class="srcpill reading">${I.slack}<span class="s"></span>Slack · connecting</span></div>
    <div id="blBody"><div class="skrow"><div class="skel" style="width:55%"></div><div class="skel" style="width:80%"></div></div></div>
  </div></div>`;
  later(()=>{
    const s=document.getElementById('blSrc');if(s)s.innerHTML=`<span class="srcpill ok">${I.mail}<span class="s"></span>Gmail · read 4 threads</span><span class="srcpill fail">${I.slack}<span class="s"></span>Slack · sign-in expired <span class="re" onclick="reconnectSlack()">Reconnect</span></span>`;
    const t=document.getElementById('blTitle');if(t)t.textContent='Partly done — Slack is blocked';
    const b=document.getElementById('blBody');if(b)b.innerHTML=`<div class="exc"><div class="ei">${I.alert}</div><div class="em"><div class="et">Slack sign-in expired, so I couldn't read your channels</div><div class="ew">Your Gmail read fine. The Slack part of this task is paused until you reconnect — nothing was posted or changed.</div></div><button class="btn" onclick="reconnectSlack()">Reconnect Slack</button></div>
      <div class="sec"><div class="h">What completed</div><ul class="rlist"><li><div class="who"><div class="nm">Gmail — 4 threads checked</div><div class="sug">1 looks blocking: the MSA owner is waiting on your counter to Northwind.</div></div><div class="act"><button class="btn" data-go="packet:northwind">Open counter</button></div></li></ul></div>
      <div class="sec"><div class="h">What's blocked</div><ul class="rlist"><li><div class="who"><div class="nm">Slack #deals, #support — not read</div><div class="sug">Needs a fresh Slack sign-in. I'll resume this exact check once you reconnect.</div></div><div class="act"><button class="btn primary" onclick="reconnectSlack()">Reconnect</button></div></li></ul></div>
      <div class="foot">${I.shield}<span>Reading only. Nothing was posted to Slack.</span></div>`;
  },950);
}
function reconnectSlack(){
  const s=document.getElementById('blSrc');if(s)s.innerHTML=`<span class="srcpill ok">${I.mail}<span class="s"></span>Gmail · read</span><span class="srcpill reading">${I.slack}<span class="s"></span>Slack · reconnecting</span>`;
  later(()=>{dispatch({type:'source_reconnected'});renderSlackResolved();},1100);
}
function renderSlackResolved(){
  setCrumb('<b>Work</b>',false);
  main.innerHTML=`<div class="page"><div class="wrap">
    <div class="state-head"><h1>Slack reconnected — check resumed</h1><span class="meta">read-only · nothing posted</span></div>
    <div class="srcread"><span class="srcpill ok">${I.mail}<span class="s"></span>Gmail · read</span><span class="srcpill ok">${I.slack}<span class="s"></span>Slack · read 4 threads</span></div>
    <div class="sec"><div class="h">Needs a response</div><ul class="rlist">
      <li><div class="who"><div class="nm">#deals — Sarah asks if the Northwind MSA needs the new indemnity cap</div><div class="sug">Belongs with the counter you're drafting.</div></div><div class="act"><button class="btn" data-go="packet:northwind">Attach to packet</button></div></li>
      <li><div class="who"><div class="nm">#support — outage thread needs an owner</div><div class="sug">Suggested: summarize a follow-up plan.</div></div><div class="act"><button class="btn primary">Summarize plan</button></div></li></ul></div>
    <div class="foot">${I.shield}<span>The blocked item moved to "Ready to review" in your rail.</span></div>
  </div></div>`;
  markActive('blocked:slack');
}

/* ============ PACKET ============ */
const PT=[['overview','Overview'],['document','Document'],['email','Email'],['evidence','Evidence'],['activity','Activity']];
let packetTab='overview';
function renderPacket(tab){
  packetTab=tab||'overview';
  setCrumb('<span class="sep">Work</span> / <b>Counter to Northwind</b>',true);
  main.innerHTML=`<div class="page"><div class="pwide">
    <div class="pk-head"><div class="pk-state" id="pkState"><span class="d"></span>Drafted · held for your approval</div>
      <h1>Counter to Northwind, MSA renewal</h1>
      <div class="pk-ctx"><span class="ctx">${I.mail}Dana Reyes</span><span class="ctx">${I.doc}Services Agreement (current)</span><span class="ctx">${I.slack}#deals</span><span class="ctx" style="color:var(--muted)">Due today</span></div>
      <div class="tabs" id="tabs"></div></div>
    <div class="tabwrap" id="tabwrap"></div></div><div id="appbarSlot"></div></div>`;
  renderTabs();renderTabBody();renderAppbar();
}
function renderTabs(){
  document.getElementById('tabs').innerHTML=PT.map(t=>{
    const reviewed=(t[0]==='document'&&S.packet.viewed.document)||(t[0]==='email'&&S.packet.viewed.email&&!S.packet.emailEdited);
    const badge=t[0]==='evidence'?'<span class="badge">5</span>':(t[0]==='document'?`<span class="badge">v${S.packet.version}</span>`:'');

          <div style="flex:1 1 200px;min-width:0">
            <div class="en"><b>${p.who}</b> <span style="color:var(--muted)">· ${p.org} · you reply ${p.reply}</span></div>
            <div class="trigger" style="color:var(--muted)">${p.why}</div></div>
          <div style="flex:none;margin-left:auto">${tierSelect(realIdx,p.tier)}</div></div>`;}).join('')}</div>
      <div class="foot" style="margin-top:10px">${I.web}<span>Tiers are inferred from your reply rate and speed. Change one and the day re-ranks immediately.</span></div></div>

    <div class="sec"><div class="h">Patterns IronClaw follows</div>
      <div class="ev-list">${PERSPECTIVE.patterns.map(x=>`
        <div class="evrow"><span class="ei">${I.check}</span>
          <div><div class="en">${x.p}</div></div><span class="et">${x.seen}</span></div>`).join('')}</div></div>

    <div class="sec"><div class="h">Model &amp; effort</div>
      <p class="lede" style="font-size:13px;margin:0 0 10px">The default brain IronClaw uses. Override per task from the command bar.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <label style="display:flex;flex-direction:column;gap:5px;font:600 12px var(--sans);color:var(--muted)">Default model
          <select id="pModel" style="font:14px var(--sans);border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--surface);color:var(--ink);min-width:200px"><option>GLM-5.1-FP8</option><option>Claude Opus 4.7</option><option>Claude Sonnet 4.6</option><option>gpt-oss-120b</option><option>DeepSeek V4 Pro</option></select></label>
        <label style="display:flex;flex-direction:column;gap:5px;font:600 12px var(--sans);color:var(--muted)">Default effort
          <select id="pEffort" style="font:14px var(--sans);border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--surface);color:var(--ink);min-width:160px"><option>Standard</option><option>Careful — slower, double-checks</option><option>Background — long jobs</option></select></label>
        <label style="display:flex;flex-direction:column;gap:5px;font:600 12px var(--sans);color:var(--muted)">For your VIPs
          <select id="pVip" style="font:14px var(--sans);border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--surface);color:var(--ink);min-width:160px"><option>Careful effort</option><option>Same as default</option></select></label></div>
      <div class="foot" style="margin-top:10px">${I.shield}<span>Stored locally to your workspace. Changing the model never changes what's allowed to leave — sends still need your approval.</span></div></div>

    <div style="display:flex;gap:8px"><button class="btn primary" id="pSave">Save</button><button class="btn" data-go="home">Back to work</button></div>
  </div></div>`;
  main.querySelectorAll('[data-person]').forEach(s=>s.addEventListener('change',e=>{
    const i=+e.target.getAttribute('data-person');PERSPECTIVE.people[i].tier=e.target.value;flash('Updated — your day will re-rank.');renderPerspective();}));
  const ps=document.getElementById('pSave');if(ps)ps.addEventListener('click',()=>flash('Saved to your workspace.'));
}

/* ============ command ============ */
function detectAction(t){t=t.toLowerCase().trim();if(!t)return 'Ask';if(/^(what|who|when|where|why|how|is|are|do|does|did|can|check|show|summari)/.test(t)||/\?$/.test(t))return 'Ask';if(/draft|write|prepare|reply|counter|amendment|email|memo|update/.test(t))return 'Draft';if(/research|watch|monitor|grow|find|build|track/.test(t))return 'Start';return 'Review plan';}
function routeFromText(t){t=t.toLowerCase();if(/northwind|counter|liability|net 45|net 60|redline|msa/.test(t))return 'packet:northwind';if(/slack|blocked|blocker/.test(t))return 'blocked:slack';if(/email|inbox|need me|needs me|need you/.test(t))return 'readout:needs';if(/research|tee|vendor|shortlist/.test(t))return 'research:tee';if(/investor|update/.test(t))return 'investor';if(/watch|monitor|competitor|weekly/.test(t))return 'research:tee';return 'readout:needs';}
function wireCommand(){
  const cmd=document.getElementById('cmd'),send=document.getElementById('send'),lbl=document.getElementById('sendlbl');
  const grow=()=>{cmd.style.height='auto';cmd.style.height=Math.min(240,Math.max(118,cmd.scrollHeight))+'px';};
  cmd.addEventListener('input',()=>{lbl.textContent=detectAction(cmd.value);grow();});
  send.addEventListener('click',()=>{const k=routeFromText(cmd.value||'what needs me today?');const o=send.innerHTML;send.innerHTML='Working…';later(()=>{send.innerHTML=o;go(k);},180);});
  cmd.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();send.click();}});
  document.querySelectorAll('#chips [data-fill],#exrow [data-fill]').forEach(c=>c.addEventListener('click',()=>{cmd.value=c.getAttribute('data-fill');cmd.dispatchEvent(new Event('input'));cmd.focus();}));
  document.getElementById('moreEx').addEventListener('click',e=>{const r=document.getElementById('exrow');e.currentTarget.setAttribute('aria-expanded',r.classList.toggle('open'));});
}
function flash(msg){const f=document.createElement('div');f.textContent=msg;f.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--rail);color:#fff;padding:9px 15px;border-radius:9px;font-size:13px;z-index:95;box-shadow:var(--shadow-pop)';document.body.appendChild(f);later(()=>f.remove(),1600);}

/* ============ global ============ */
document.getElementById('themeBtn').addEventListener('click',e=>{const r=document.documentElement;const d=r.getAttribute('data-theme')!=='dark';r.setAttribute('data-theme',d?'dark':'light');e.currentTarget.setAttribute('aria-pressed',String(d));});
document.getElementById('backBtn').addEventListener('click',()=>go('home'));
document.getElementById('menuBtn').addEventListener('click',()=>{dock.classList.toggle('open');backdrop.classList.toggle('on',dock.classList.contains('open'));});
document.addEventListener('click',e=>{const el=e.target.closest('[data-go]');if(el){if(window.matchMedia('(max-width:1120px)').matches){dock.classList.remove('open');backdrop.classList.remove('on');}go(el.getAttribute('data-go'));}});
document.addEventListener('keydown',e=>{if(e.key==='d'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='INPUT'&&e.target.getAttribute('contenteditable')!=='true'){document.getElementById('dev').classList.toggle('on');}});

renderDock();
scene('home');
</script>
</body>
</html>
